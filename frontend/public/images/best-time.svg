<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!-- shadow -->
  <ellipse cx="120" cy="138" rx="56" ry="6" fill="#0f172a" opacity="0.08" />
  <!-- clock outer ring -->
  <circle cx="120" cy="78" r="54" fill="#3b82f6" />
  <circle cx="120" cy="78" r="48" fill="#dbeafe" />
  <!-- ticks -->
  <g stroke="#1d4ed8" stroke-width="2" stroke-linecap="round">
    <line x1="120" y1="34" x2="120" y2="40" />
    <line x1="164" y1="78" x2="158" y2="78" />
    <line x1="120" y1="122" x2="120" y2="116" />
    <line x1="76"  y1="78" x2="82"  y2="78" />
  </g>
  <!-- hands -->
  <line x1="120" y1="78" x2="120" y2="48" stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round" />
  <line x1="120" y1="78" x2="148" y2="86" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round" />
  <circle cx="120" cy="78" r="4" fill="#1e3a8a" />
  <!-- crown (top button) -->
  <rect x="116" y="20" width="8" height="6" rx="2" fill="#1d4ed8" />
  <!-- price tag -->
  <g transform="translate(166,26)">
    <path d="M0 0 L34 0 L46 14 L34 28 L0 28 Z" fill="#22c55e" />
    <circle cx="36" cy="14" r="3" fill="#bbf7d0" />
    <text x="6" y="19" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#ffffff">$</text>
  </g>
</svg>
